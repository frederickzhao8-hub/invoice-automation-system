services:
  postgres:
    image: postgres:16-alpine
    container_name: invoice-automation-system-supply-chain-db
    environment:
      POSTGRES_DB: invoice_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
