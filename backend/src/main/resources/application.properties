spring.application.name=invoice-automation-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/invoice_automation}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.llm.enabled=${APP_LLM_ENABLED:false}
app.llm.base-url=${APP_LLM_BASE_URL:https://api.openai.com/v1}
app.llm.chat-completions-path=${APP_LLM_CHAT_COMPLETIONS_PATH:/chat/completions}
app.llm.api-key=${APP_LLM_API_KEY:}
app.llm.model=${APP_LLM_MODEL:gpt-4o-mini}
app.llm.timeout=${APP_LLM_TIMEOUT:30s}
app.llm.temperature=${APP_LLM_TEMPERATURE:0.1}
